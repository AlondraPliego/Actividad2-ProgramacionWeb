<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actividad 2</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="formulario">
        <h1>Datos Personales</h1>
        <form id="formDatos">
            <div class="campo">
                <label for="nombre">Nombre:</label>
                <input type="text" id="nombre" placeholder="Ej: Alondra Pliego" required>
            </div>
            <p class="error" id="errorNombre"></p>

            <div class="campo">
                <label for="telefono">Teléfono:</label>
                <input type="number" min="0" id="telefono" placeholder="Ej: 9511234567" required>
            </div>
            <p class="error" id="errorTelefono"></p>

            <div class="campo">
                <label for="fechaNacimiento">Fecha de nacimiento:</label>
                <input type="date" id="fechaNacimiento" required>
            </div>
            <p class="error" id="errorFecha"></p>

            <button type="button" onclick="guardarDatos()">Guardar</button>
        </form>
    </div>

    <div id="modal" class="modal oculto">
        <div class="modalGuardados">
            <h2>Datos guardados</h2>
            <p id="nombre-guardado"></p>
            <p id="telefono-guardado"></p>
            <p id="edad-calculada"></p>
            <p id="edad-validacion"></p>
            <button type="button" onclick="cerrarModal()">Cerrar</button>
        </div>
    </div>

    <div class="recetarios">
        <h1>Escalar receta</h1>
        <form id="formReceta">
            <div class="campo">
                <label for="nombreReceta">Nombre de la receta:</label>
                <input type="text" id="nombreReceta" placeholder="Ej: Tiramisú">
            </div>
            <div class="campo">
                <label for="porcionesOriginales">¿Para cuántas porciones rinde?</label>
                <input type="number" id="porcionesOriginales" min="1" placeholder="Ej: 4">
            </div>
            <hr>
            <div class="campo">
                <label for="nombreIngrediente">Nombre del ingrediente:</label>
                <input type="text" id="nombreIngrediente" placeholder="Ej: Harina">
                <label for="cantidadIngrediente">Cantidad:</label>
                <input type="number" id="cantidadIngrediente" min="0" step="0.01" placeholder="Ej: 2">
                <button type="button" onclick="agregarIngrediente()">Agregar ingrediente</button>
            </div>
            <p class="error" id="errorIngrediente"></p>
            <ul id="listaIngredientes"></ul>
            <hr>
            <div class="campo">
                <label for="porcionesDeseadas">¿Para cuántas porciones quieres escalarla?</label>
                <input type="number" id="porcionesDeseadas" min="1" placeholder="Ej: 10">
                <button type="button" onclick="calcularEscala()">Calcular</button>
            </div>
            <div class="oculto" id="resultadoER">
            <h3>Resultado</h3>
            <p class="error" id="errorEscala"></p>
            <ul id="resultadoEscala"></ul>
            </div>
        </form>
    </div>

    <div class="recetarios">
    <h1>Pasar de gramos a onzas</h1>
    <form id="formConversion">
        <div class="campo">
            <label for="cantidadGramos">Cantidad en gramos:</label>
            <input type="number" id="cantidadGramos" min="0" step="0.01" placeholder="Ej: 200">
            <button type="button" onclick="convertir()">Convertir</button>
            <p class="oculto" id="rC"><strong>Resultado:</strong> <span id="resultadoConversion"></span></p>
        </div>
        <p class="error" id="errorConversion"></p>
    </form>
</div>

    <script src="js/utileria.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
